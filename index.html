<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安心小宇宙 - 能量累積計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F7F4; color: #4A443F; font-size: 13px; }
        .loading-overlay { background: rgba(248, 247, 244, 1); position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .day-btn { transition: all 0.15s ease; cursor: pointer; }
        input:focus { outline: 2px solid #967E6B; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化
        let db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'an-xin-cosmos-v1';

        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Failed", e);
        }

        const e = React.createElement;

        // --- 中文輸入優化元件 ---
        const GoalInput = ({ initialValue, onSave }) => {
            const inputRef = useRef(null);
            const isComposing = useRef(false);

            useEffect(() => {
                if (inputRef.current && !isComposing.current) {
                    inputRef.current.value = initialValue || '';
                }
            }, [initialValue]);

            return e('input', {
                ref: inputRef,
                type: 'text',
                className: "text-[11px] font-medium text-[#967E6B] bg-[#FAF9F6] px-2 py-1 rounded-md outline-none w-full placeholder:text-[#CDC5BC] italic",
                placeholder: "設定本週小目標...",
                onCompositionStart: () => { isComposing.current = true; },
                onCompositionEnd: (ev) => { 
                    isComposing.current = false; 
                },
                onBlur: () => {
                    if (!isComposing.current) onSave(inputRef.current.value);
                },
                onKeyDown: (ev) => {
                    if (ev.key === 'Enter') inputRef.current.blur();
                }
            });
        };

        const IconTrash = () => e('svg', { width: "12", height: "12", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
            e('path', { d: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" })
        );

        function App() {
            const [user, setUser] = useState(null);
            const [members, setMembers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('management');
            const [selectedWeek, setSelectedWeek] = useState(1);
            const [newName, setNewName] = useState('');
            const [deleteTarget, setDeleteTarget] = useState(null);

            useEffect(() => {
                const performAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.error("Auth Error", err); }
                };
                performAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                return onSnapshot(q, (snapshot) => {
                    setMembers(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                }, (err) => {
                    console.error("Firestore Error", err);
                    setLoading(false);
                });
            }, [user]);

            const calculateScore = (m, week) => {
                const weekKey = `w${week}`;
                const days = m.weeks?.[weekKey] || Array(7).fill({ done: false, photo: false });
                const doneCount = days.filter(d => d.done).length;
                const photoCount = days.filter(d => d.photo).length;
                let coins = doneCount >= 7 ? 90 : doneCount >= 5 ? 60 : doneCount >= 3 ? 30 : 0;
                if (photoCount >= 3) coins += 50;
                if (photoCount >= 7) coins += 100;
                const total = coins + Number(m.bonus?.[weekKey] || 0);
                return { total, cash: Math.floor(total / 10) };
            };

            const rankingData = useMemo(() => {
                return members.map(m => {
                    let grandTotal = 0;
                    for(let i=1; i<=12; i++) grandTotal += calculateScore(m, i).total;
                    return { ...m, grandTotal };
                }).sort((a, b) => b.grandTotal - a.grandTotal);
            }, [members]);

            const updateMember = async (data) => {
                if (!user) return;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', data.id), data);
            };

            const toggleDay = async (mId, dayIdx) => {
                const m = members.find(x => x.id === mId);
                const weekKey = `w${selectedWeek}`;
                const weeks = { ...m.weeks };
                const days = [...(weeks[weekKey] || Array(7).fill({ done: false, photo: false }))];
                const curr = days[dayIdx];
                if (!curr.done) days[dayIdx] = { done: true, photo: false };
                else if (!curr.photo) days[dayIdx] = { done: true, photo: true };
                else days[dayIdx] = { done: false, photo: false };
                weeks[weekKey] = days;
                await updateMember({ ...m, weeks });
            };

            if (loading) return e('div', { className: 'loading-overlay' }, e('div', { className: 'w-8 h-8 border-4 border-[#967E6B] border-t-transparent rounded-full animate-spin' }));

            return e('div', { className: "min-h-screen p-4 md:p-10 max-w-6xl mx-auto" },
                deleteTarget && e('div', { className: "fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm" },
                    e('div', { className: "bg-white rounded-3xl p-6 max-w-xs w-full shadow-2xl" },
                        e('h3', { className: "text-sm font-black mb-2" }, "刪除成員？"),
                        e('p', { className: "text-[11px] text-gray-400 mb-6" }, "這將永久移除該位成員的雲端紀錄。"),
                        e('div', { className: "flex gap-2" },
                            e('button', { onClick: () => setDeleteTarget(null), className: "flex-1 py-2 bg-gray-100 rounded-xl font-bold text-[11px]" }, "取消"),
                            e('button', { onClick: async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', deleteTarget)); setDeleteTarget(null); }, className: "flex-1 py-2 bg-red-500 text-white rounded-xl font-bold text-[11px]" }, "確定刪除")
                        )
                    )
                ),
                e('div', { className: "flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10" },
                    e('div', null,
                        e('h1', { className: "text-xl font-black text-[#3D362F] tracking-tight" }, "安心小宇宙"),
                        e('p', { className: "text-[10px] font-bold text-[#A69B8F] tracking-widest mt-1" }, "ENERGY PERSISTENCE PLAN")
                    ),
                    e('div', { className: "flex bg-white p-1 rounded-2xl border border-[#EAE2D5]" },
                        e('button', { onClick: () => setActiveTab('management'), className: `px-5 py-2 rounded-xl text-[11px] font-black ${activeTab === 'management' ? 'bg-[#967E6B] text-white shadow-lg' : 'text-[#A69B8F]'}` }, "數據管理"),
                        e('button', { onClick: () => setActiveTab('ranking'), className: `px-5 py-2 rounded-xl text-[11px] font-black ${activeTab === 'ranking' ? 'bg-[#3D362F] text-white shadow-lg' : 'text-[#A69B8F]'}` }, "累積排行榜")
                    )
                ),
                activeTab === 'management' ? e('div', { className: "space-y-6" },
                    e('div', { className: "flex flex-col md:flex-row gap-4" },
                        e('div', { className: "bg-white flex-1 flex rounded-2xl shadow-sm border border-[#EAE2D5] overflow-hidden" },
                            e('input', { value: newName, onChange: (ev) => setNewName(ev.target.value), placeholder: "輸入新成員姓名...", className: "flex-1 px-4 py-4 outline-none font-bold text-xs", onKeyPress: (ev) => ev.key === 'Enter' && (async () => { if(!newName.trim()) return; await updateMember({ id: Date.now().toString(), name: newName, weeks: {}, goals: {}, bonus: {} }); setNewName(''); })() }),
                            e('button', { onClick: async () => { if(!newName.trim()) return; await updateMember({ id: Date.now().toString(), name: newName, weeks: {}, goals: {}, bonus: {} }); setNewName(''); }, className: "bg-[#967E6B] text-white px-6 text-[11px] font-black" }, "加入")
                        ),
                        e('div', { className: "bg-white px-4 py-2 rounded-2xl shadow-sm border border-[#EAE2D5] flex items-center gap-3" },
                            e('span', { className: "text-[10px] font-black text-gray-400" }, "WEEK"),
                            e('select', { value: selectedWeek, onChange: (ev) => setSelectedWeek(Number(ev.target.value)), className: "font-black text-xs text-[#967E6B] outline-none bg-transparent" },
                                [...Array(12)].map((_, i) => e('option', { key: i+1, value: i+1 }, i+1))
                            )
                        )
                    ),
                    e('div', { className: "bg-white rounded-[2rem] shadow-sm border border-[#EAE2D5] overflow-hidden" },
                        e('div', { className: "overflow-x-auto" },
                            e('table', { className: "w-full text-left text-[13px]" },
                                e('thead', { className: "bg-[#FAF9F6] border-b border-[#EAE2D5]" },
                                    e('tr', { className: "text-[10px] font-black text-[#A69B8F] uppercase tracking-wider" },
                                        e('th', { className: "px-8 py-4" }, "成員與目標"),
                                        e('th', { className: "px-4 py-4 text-center" }, "每日打卡"),
                                        e('th', { className: "px-4 py-4 text-center w-20" }, "加碼"),
                                        e('th', { className: "px-8 py-4 text-right" }, "本週/購物金")
                                    )
                                ),
                                e('tbody', { className: "divide-y divide-[#F1EFE9]" },
                                    members.map(m => {
                                        const stats = calculateScore(m, selectedWeek);
                                        const weekKey = `w${selectedWeek}`;
                                        const days = m.weeks?.[weekKey] || Array(7).fill({ done: false, photo: false });
                                        return e('tr', { key: m.id, className: "hover:bg-[#FAF9F6]/50 transition-colors" },
                                            e('td', { className: "px-8 py-5" },
                                                e('div', { className: "flex items-center gap-2 mb-2" },
                                                    e('span', { className: "font-black text-[#3D362F]" }, m.name),
                                                    e('button', { onClick: () => setDeleteTarget(m.id), className: "text-gray-300 hover:text-red-400 p-1" }, e(IconTrash))
                                                ),
                                                e(GoalInput, { initialValue: m.goals?.[weekKey] || '', onSave: (val) => updateMember({ ...m, goals: { ...(m.goals || {}), [weekKey]: val } }) })
                                            ),
                                            e('td', { className: "px-4 py-5" },
                                                e('div', { className: "flex justify-center gap-1.5" },
                                                    days.map((d, i) => e('button', { key: i, onClick: () => toggleDay(m.id, i), className: `w-8 h-8 rounded-lg font-black text-[10px] day-btn border-2 ${d.photo ? 'bg-[#D4A373] text-white border-[#D4A373]' : d.done ? 'bg-[#967E6B] text-white border-[#967E6B]' : 'bg-white text-gray-200 border-gray-50'}` }, i + 1))
                                                )
                                            ),
                                            e('td', { className: "px-4 py-5 text-center" },
                                                e('input', { type: 'number', value: m.bonus?.[weekKey] || 0, onChange: (ev) => updateMember({ ...m, bonus: { ...(m.bonus || {}), [weekKey]: Number(ev.target.value) } }), className: "w-12 h-8 bg-gray-50 rounded-lg text-center font-black text-blue-500 outline-none text-[11px]" })
                                            ),
                                            e('td', { className: "px-8 py-5 text-right" },
                                                e('div', { className: "font-black text-[#3D362F]" }, `${stats.total} 幣`),
                                                e('div', { className: "text-[10px] font-black text-[#D4A373]" }, `NT$ ${stats.cash}`)
                                            )
                                        );
                                    })
                                )
                            )
                        )
                    )
                ) : e('div', { className: "max-w-xl mx-auto space-y-4" },
                    rankingData.map((m, idx) => e('div', { key: m.id, className: "bg-white rounded-3xl p-5 shadow-sm border border-[#EAE2D5] flex items-center gap-6" },
                        e('div', { className: `w-12 h-12 rounded-xl flex items-center justify-center text-lg font-black ${idx === 0 ? 'bg-yellow-400 text-white' : 'bg-gray-100 text-gray-400'}` }, idx + 1),
                        e('div', { className: "flex-1" },
                            e('h3', { className: "font-black text-[#3D362F]" }, m.name),
                            e('p', { className: "text-[10px] text-gray-400 mt-1 italic" }, `「${m.goals?.[`w${selectedWeek}`] || "深空探索中"}」`)
                        ),
                        e('div', { className: "text-right" },
                            e('div', { className: "text-lg font-black text-[#3D362F]" }, m.grandTotal),
                            e('div', { className: "text-[10px] font-black text-[#D4A373]" }, `NT$ ${Math.floor(m.grandTotal / 10)}`)
                        )
                    ))
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
